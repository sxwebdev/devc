version: 2

# Cross-build the embedded devc-secretfs FUSE helper before building devc, so
# go:embed includes it. devc copies the matching Linux binary into the container
# at runtime; the image needs no extra packages.
before:
  hooks:
    - go mod tidy
    - sh -c 'GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o internal/secretfsbin/embedded/devc-secretfs-linux-amd64 ./cmd/secretfs'
    - sh -c 'GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o internal/secretfsbin/embedded/devc-secretfs-linux-arm64 ./cmd/secretfs'

builds:
  - main: .
    binary: devc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: sxwebdev
      name: devc
    directory: HomebrewFormula
    homepage: "https://github.com/sxwebdev/devc"
    description: "AI-safe development containers with devcontainer.json support"
    license: "MIT"
    install: |
      bin.install "devc"
    test: |
      system "#{bin}/devc", "--help"
    dependencies:
      - name: docker
        type: optional
