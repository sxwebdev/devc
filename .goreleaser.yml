version: 2

builds:
  - main: .
    binary: devc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: sxwebdev
      name: devc
    directory: HomebrewFormula
    homepage: "https://github.com/sxwebdev/devc"
    description: "AI-safe development containers with devcontainer.json support"
    license: "MIT"
    install: |
      bin.install "devc"
    test: |
      system "#{bin}/devc", "--help"
    dependencies:
      - name: docker
        type: optional
